version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: kitchen-postgres
    environment:
      POSTGRES_DB: central_kitchen
      POSTGRES_USER: kitchen
      POSTGRES_PASSWORD: kitchen123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchen -d central_kitchen"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kitchen-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/central_kitchen
      SPRING_DATASOURCE_USERNAME: kitchen
      SPRING_DATASOURCE_PASSWORD: kitchen123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kitchen-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres-data:
